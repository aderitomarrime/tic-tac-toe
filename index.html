<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="players">
            <div class="player1">
                <h1>Name</h1>
                <h2>token</h2>
            </div>
            <div class="player2">
                <h1>Name</h1>
                <h2>token</h2>
            </div>
        </div>

        <div class="gameboard">
            <div class="square" id="0"></div>
            <div class="square" id="1"></div>
            <div class="square" id="2"></div>
            <div class="square" id="3"></div>
            <div class="square" id="4"></div>
            <div class="square" id="5"></div>
            <div class="square" id="6"></div>
            <div class="square" id="7"></div>
            <div class="square" id="8"></div>
        </div>

        <div class="buttons">
            <button class="names">Change Names</button>
            <button class="restart">Restart</button>
        </div>

        <dialog closedby="any" id="announce-winner">
            <h1>O/X</h1>
            <p>PlayerX is the winner!</p>
            <div class="modalButtons">
                <button>See board</button>
                <button>Restart game</button>
            </div>
        </dialog>

        <dialog closedby="any" id="change-names">
            <form action="">
                <div>
                    <label for="playerone">Player 1</label>
                    <input type="text" name="playerone" id="playerone" placeholder="Enter name" minlength="3" maxlength="10" required>
                </div>
                <div>
                    <label for="playertwo">Player 2</label>
                    <input type="text" name="playertwo" id="playertwo" placeholder="Enter name" minlength="3" maxlength="10" required>
                </div>
                <div class="form-buttons">
                    <input type="button" value="Cancel" formmethod="dialog">
                    <input type="submit" value="Change">
                </div>
            </form>
        </dialog>
    </div>
</body>
</html>
